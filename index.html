<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Nosso Álbum ❤️</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* STORY */
.story {
  width: 100vw;
  height: 100vh;
  position: relative;
}

.story img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: opacity 0.4s ease;
}

/* TEXTO */
.texto {
  position: absolute;
  bottom: 80px;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 20px;
  text-shadow: 0 0 10px black;
  padding: 0 10px;
}

/* ÁREAS DE CLIQUE */
.btn {
  position: absolute;
  top: 0;
  width: 50%;
  height: 100%;
}

#prev { left: 0; }
#next { right: 0; }

/* PLAYER OCULTO */
iframe {
  position: absolute;
  width: 1px;
  height: 1px;
  opacity: 0;
  pointer-events: none;
}
</style>
</head>

<body>

<div class="story">

  <img id="img" src="foto1.jpg">

  <div class="texto" id="texto">
    Nosso primeiro momento ❤️
  </div>

  <div class="btn" id="prev" onclick="voltar()"></div>
  <div class="btn" id="next" onclick="avancar()"></div>

  <iframe id="player" allow="autoplay"></iframe>

</div>

<script>
const fotos = [
  {
    img: "foto1.jpg",
    texto: "Nosso primeiro momento ❤️",
    music: "https://www.youtube.com/embed/hh9WgYHRuhU?autoplay=1"
  },
  {
    img: "foto2.jpg",
    texto: "Cada lembrança com você 🌹",
    music: "https://www.youtube.com/embed/dhYOPzcsbGM?autoplay=1"
  },
  {
    img: "foto3.jpg",
    texto: "Você é meu lugar favorito ❤️",
    music: "https://www.youtube.com/embed/kJQP7kiw5Fk?autoplay=1"
  },
  {
    img: "foto4.jpg",
    texto: "Se for com você, eu topo tudo ✨",
    music: "https://www.youtube.com/embed/OPf0YbXqDm0?autoplay=1"
  }
];

let i = 0;

function atualizar() {
  document.getElementById("img").src = fotos[i].img;
  document.getElementById("texto").innerText = fotos[i].texto;

  // troca música
  document.getElementById("player").src = fotos[i].music;
}

function avancar() {
  i++;
  if (i >= fotos.length) i = 0;
  atualizar();
}

function voltar() {
  i--;
  if (i < 0) i = fotos.length - 1;
  atualizar();
}

// inicia
atualizar();
</script>

</body>
</html>
