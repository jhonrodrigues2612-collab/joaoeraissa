<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Nosso Spotify ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #121212;
  color: white;
}

/* topo */
.header {
  background: #000;
  padding: 20px;
  font-size: 20px;
  font-weight: bold;
  color: #1db954;
}

/* lista */
.container {
  padding: 15px;
}

.song {
  display: flex;
  align-items: center;
  background: #181818;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 10px;
  cursor: pointer;
}

.song:hover {
  background: #282828;
}

.song img {
  width: 60px;
  height: 60px;
  border-radius: 10px;
  margin-right: 10px;
  object-fit: cover;
}

.title {
  font-size: 16px;
}

.sub {
  font-size: 12px;
  color: #aaa;
}

/* player invisível */
iframe {
  width: 1px;
  height: 1px;
  opacity: 0;
}
</style>
</head>

<body>

<div class="header">
🎧 Nosso Spotify
</div>

<div class="container">

  <div class="song" onclick="play('foto1.jpg','Nosso começo ❤️','https://www.youtube.com/embed/hh9WgYHRuhU?autoplay=1')">
    <img src="foto1.jpg">
    <div>
      <div class="title">Nosso começo ❤️</div>
      <div class="sub">Toque para ouvir</div>
    </div>
  </div>

  <div class="song" onclick="play('foto2.jpg','Momentos especiais 🌹','https://www.youtube.com/embed/dhYOPzcsbGM?autoplay=1')">
    <img src="foto2.jpg">
    <div>
      <div class="title">Momentos especiais 🌹</div>
      <div class="sub">Toque para ouvir</div>
    </div>
  </div>

  <div class="song" onclick="play('foto3.jpg','Você é meu lugar ❤️','https://www.youtube.com/embed/kJQP7kiw5Fk?autoplay=1')">
    <img src="foto3.jpg">
    <div>
      <div class="title">Você é meu lugar ❤️</div>
      <div class="sub">Toque para ouvir</div>
    </div>
  </div>

</div>

<iframe id="player" allow="autoplay"></iframe>

<script>
function play(img, title, music) {
  document.getElementById("player").src = music;
}
</script>

</body>
</html>
